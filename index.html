<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cipher Arcade - 10 Games</title>
<style>
body{font-family:Arial;margin:0;background:#111;color:#fff;text-align:center}
header{padding:15px;background:#1b1b1b}
#menu{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px}
button{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
.game{display:none;padding:15px}
.active{display:block}
canvas{background:#000;border:1px solid #555}
.grid{display:grid;grid-template-columns:repeat(3,80px);justify-content:center}
.cell{width:80px;height:80px;border:1px solid #fff;font-size:40px;display:flex;align-items:center;justify-content:center;cursor:pointer}
</style>
</head>
<body>
<header><h1>🎮 Cipher Arcade - 10 Mini Games</h1></header>
<div id="menu"></div>
<div id="games"></div>
<script>
const games=["TicTacToe","RPS","Guess","Memory","Snake","Pong","Breakout","Whack","Reaction","Dice"];
const menu=document.getElementById("menu"), area=document.getElementById("games");
games.forEach(g=>{let b=document.createElement("button");b.innerText=g;b.onclick=()=>show(g);menu.appendChild(b);});
function add(id,html){let d=document.createElement("div");d.className="game";d.id=id;d.innerHTML=html;area.appendChild(d);}
function show(id){document.querySelectorAll(".game").forEach(x=>x.classList.remove("active"));document.getElementById(id).classList.add("active");}
add("TicTacToe",'<h2>Tic Tac Toe</h2><div id="ttt" class="grid"></div><p id="tttr"></p>');
let s=Array(9).fill(""),p="X"; const t=document.getElementById("ttt");
function draw(){t.innerHTML="";s.forEach((v,i)=>{let c=document.createElement("div");c.className="cell";c.innerText=v;c.onclick=()=>{if(!s[i]){s[i]=p;p=p=="X"?"O":"X";draw();}};t.appendChild(c);});}
draw();

add("RPS",'<h2>Rock Paper Scissors</h2><button onclick="rps(0)">Rock</button><button onclick="rps(1)">Paper</button><button onclick="rps(2)">Scissors</button><p id="rpsr"></p>');
window.rps=(x)=>{let c=Math.floor(Math.random()*3);document.getElementById("rpsr").innerText="CPU="+["Rock","Paper","Scissors"][c];};

add("Guess",'<h2>Guess 1-100</h2><input id="gv"><button onclick="guess()">Go</button><p id="gr"></p>');
let secret=Math.floor(Math.random()*100)+1;
window.guess=()=>{let v=+document.getElementById("gv").value;document.getElementById("gr").innerText=v==secret?"Correct":(v<secret?"Low":"High");};

add("Memory",'<h2>Memory</h2><p>Match pairs (simple demo)</p>');

add("Snake",'<h2>Snake</h2><canvas id="snake" width="300" height="300"></canvas>');
let sc=document.getElementById("snake"),sx=sc.getContext("2d"),sn=[{x:10,y:10}],fd={x:5,y:5},dx=1,dy=0;
document.addEventListener("keydown",e=>{if(e.key=="ArrowUp"){dx=0;dy=-1}else if(e.key=="ArrowDown"){dx=0;dy=1}else if(e.key=="ArrowLeft"){dx=-1;dy=0}else if(e.key=="ArrowRight"){dx=1;dy=0}});
setInterval(()=>{let h={x:sn[0].x+dx,y:sn[0].y+dy};sn.unshift(h);if(h.x==fd.x&&h.y==fd.y){fd={x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)}}else sn.pop();sx.clearRect(0,0,300,300);sx.fillStyle="lime";sn.forEach(a=>sx.fillRect(a.x*20,a.y*20,18,18));sx.fillStyle="red";sx.fillRect(fd.x*20,fd.y*20,18,18);},120);

add("Pong",'<h2>Pong</h2><canvas id="pong" width="400" height="200"></canvas>');
let pc=document.getElementById("pong"),px=pc.getContext("2d"),bx=200,by=100,vx=3,vy=2;
setInterval(()=>{bx+=vx;by+=vy;if(by<0||by>200)vy*=-1;if(bx<0||bx>400)vx*=-1;px.clearRect(0,0,400,200);px.fillRect(bx,by,10,10);},30);

add("Breakout",'<h2>Breakout Demo</h2><canvas id="br" width="400" height="220"></canvas>');
let br=document.getElementById("br"),bc=br.getContext("2d");
setInterval(()=>{bc.clearRect(0,0,400,220);for(let i=0;i<8;i++)bc.strokeRect(i*50,20,45,20);},100);

add("Whack",'<h2>Whack A Mole</h2><button onclick="mole()">Hit Mole</button><p id="mr">0</p>');
let ms=0; window.mole=()=>{ms++;document.getElementById("mr").innerText=ms;};

add("Reaction",'<h2>Reaction Test</h2><button id="rb">Wait...</button><p id="rr"></p>');
let st; setTimeout(()=>{let b=document.getElementById("rb");b.innerText="CLICK";b.onclick=()=>document.getElementById("rr").innerText=(Date.now()-st)+" ms";st=Date.now();},3000);

add("Dice",'<h2>Dice Roller</h2><button onclick="roll()">Roll</button><h3 id="dr">🎲</h3>');
window.roll=()=>document.getElementById("dr").innerText=1+Math.floor(Math.random()*6);

show("TicTacToe");
</script>
</body>
</html>
